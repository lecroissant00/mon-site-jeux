<!DOCTYPE html>
<html lang="fr">
<head>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="page-title">Jeu — CroissantGames</title>
  <meta id="meta-description" name="description" content="Joue gratuitement en ligne sur CroissantGames.">
  <link id="canonical-link" rel="canonical" href="https://croissantgames.fr/jeu.html">

  <!-- Open Graph (rempli dynamiquement) -->
  <meta id="og-title" property="og:title" content="Jeu — CroissantGames">
  <meta id="og-description" property="og:description" content="Joue gratuitement en ligne sur CroissantGames.">
  <meta id="og-url" property="og:url" content="https://croissantgames.fr/jeu.html">

  <meta id="twitter-title" name="twitter:title" content="Jeu — CroissantGames">
  <meta id="twitter-description" name="twitter:description" content="Joue gratuitement en ligne sur CroissantGames.">

  <!-- JSON-LD (injecté dynamiquement par JS) -->
  <script id="json-ld" type="application/ld+json"></script>

  <link rel="stylesheet" href="css/style.css">

  <style>
    /* Styles spécifiques à la page jeu */
    .iframe-wrap {
      position: relative;
      max-width: 100%;
      margin: 0 auto;
    }

    /* Mode plein écran simulé en CSS — utilisé en fallback quand l'API
       Fullscreen native du navigateur n'est pas disponible ou échoue
       (cas fréquent sur mobile, notamment iOS). */
    .iframe-wrap.fake-fullscreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      z-index: 9999;
      background: #000;
      margin: 0;
    }
    .iframe-wrap.fake-fullscreen #game-frame {
      width: 100%;
      height: 100%;
      max-width: 100%;
      aspect-ratio: auto;
    }
    /* Empêche le scroll de la page derrière pendant le faux plein écran */
    body.fake-fullscreen-active {
      overflow: hidden;
    }

    .exit-fake-fullscreen-btn {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 10000;
    }
    .iframe-wrap.fake-fullscreen .exit-fake-fullscreen-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-frame {
      max-width: 100%;
      border: none;
      display: block;
      background: #000;
    }
    .pause-overlay {
      position: absolute;
      inset: 0;
      background: rgba(83, 58, 183, 0.75);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 600;
      z-index: 5;
    }
    .pause-overlay.visible { display: flex; }

    .error-box {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 4 / 3;
      background: #1a1a2e;
      color: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      border-radius: 8px;
    }
    .error-box.visible { display: flex; }
    .error-box button {
      background: #a78bfa;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #status-msg {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .game-actions {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }
    .game-actions button {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .game-actions button:hover { background: #2a2a45; }

    #play-counter {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .rating-widget, .share-widget {
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }
    .rating-label { color: var(--text-muted); }
    .rating-average {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }
    .rating-stars { font-size: 1.3rem; color: #faa627; }
    .star-pick { cursor: pointer; transition: transform 0.1s; }
    .star-pick:hover { transform: scale(1.15); }

    .share-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-heading);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
    }
    .share-btn:hover { background: var(--bg-secondary); }
    #share-twitter, #share-facebook, #share-whatsapp {
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5808527177460754" crossorigin="anonymous"></script>
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>

</head>
<body>

  <!-- Header (identique à index.html) -->
  <header class="site-header">
    <div class="logo"><a href="index.html">Croissant<span>Games</span></a></div>
    <nav class="main-nav">
      <div class="genre-dropdown" id="genre-dropdown">
        <button class="genre-toggle" id="genre-toggle" aria-haspopup="true" aria-expanded="false">

        </button>
        <div class="genre-menu" id="genre-menu"></div>
      </div>
    </nav>
    <button id="random-game-btn" class="random-btn" type="button">🎲 Jeu au hasard</button>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Changer de thème">🌙</button>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Chercher un jeu..." autocomplete="off">

  <main class="game-layout">

    <!-- Pub gauche -->
    <div class="ad-banner ad-160x600">
      <ins class="adsbygoogle"
           style="display:block; width:100%; height:100%;"
           data-ad-client="ca-pub-5808527177460754"
           data-ad-slot="4929366388"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    </div>

    <div class="game-container">
      <h1 id="game-title">Chargement...</h1>
      <div id="status-msg">⏳ Chargement du jeu...</div>

      <div class="iframe-wrap" id="iframe-wrap">
        <iframe id="game-frame" allowfullscreen allow="fullscreen" webkitallowfullscreen mozallowfullscreen scrolling="no" frameborder="0"></iframe>
        <button id="exit-fake-fullscreen" class="exit-fake-fullscreen-btn" aria-label="Quitter le plein écran">✕</button>
        <div class="pause-overlay" id="pause-overlay">⏸ Pub en cours...</div>
      </div>

      <div class="error-box" id="error-box">
        <p>❌ Une erreur est survenue lors du chargement du jeu.</p>
        <button id="retry-btn">Réessayer</button>
      </div>

      <div class="game-actions">
        <button id="fullscreen-btn">⛶ Plein écran</button>
      </div>

      <div id="play-counter"></div>

      <div class="rating-widget" id="rating-widget">
        <span class="rating-label">Note ce jeu :</span>
        <span class="rating-stars" id="rating-stars"></span>
      </div>
      <div id="rating-average" class="rating-average"></div>

      <div class="share-widget">
        <span class="rating-label">Partager :</span>
        <button class="share-btn" id="share-twitter" type="button" aria-label="Partager sur X">𝕏</button>
        <button class="share-btn" id="share-facebook" type="button" aria-label="Partager sur Facebook">f</button>
        <button class="share-btn" id="share-whatsapp" type="button" aria-label="Partager sur WhatsApp">💬</button>

    <div class="ad-banner ad-160x600">
      <ins class="adsbygoogle"
           style="display:block; width:100%; height:100%;"
           data-ad-client="ca-pub-5808527177460754"
           data-ad-slot="4929366388"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    </div>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 CroissantGames — Tous droits réservés</p>

  </footer>

  <button id="back-to-top" aria-label="Retour en haut">↑</button>

  <script src="js/supabase-stats.js"></script>
  <script>
    // =========================================
    // Lecture des paramètres URL
    // =========================================
    // Lecture des paramètres — slug (URL propre) ou params classiques
    // /jeux/football-rush-3d → Vercel rewrite → jeu.html?slug=football-rush-3d
    // jeu.html?id=xxx&nom=... → fallback params classiques
    // =========================================
    const params = new URLSearchParams(window.location.search);
    const slugFromUrl = params.get('slug');

    let gameId = params.get('id') || '';
    let gameName = params.get('nom') || 'Jeu inconnu';
    let gameWidth = parseInt(params.get('w'), 10) || 800;
    let gameHeight = parseInt(params.get('h'), 10) || 600;
    const pageUrl = window.location.href;

    async function initJeu() {
      if (slugFromUrl && typeof fetchJeuParSlug === 'function') {
        const jeu = await fetchJeuParSlug(slugFromUrl);
        if (jeu) {
          gameId = jeu.id;
          gameName = jeu.nom;
          gameWidth = jeu.width || 800;
          gameHeight = jeu.height || 600;
        }
      }
      lancerJeu();
    }

    function lancerJeu() {

    // =========================================
    // Mise à jour du titre et du H1
    // =========================================
    document.getElementById('game-title').textContent = gameName;
    document.getElementById('page-title').textContent = gameName + ' — CroissantGames';

    // =========================================
    // SEO dynamique
    // =========================================
    const description = `Joue gratuitement à ${gameName} en ligne sur CroissantGames, sans téléchargement ni inscription.`;
    document.getElementById('meta-description').setAttribute('content', description);
    document.getElementById('canonical-link').setAttribute('href', pageUrl);
    document.getElementById('og-title').setAttribute('content', gameName + ' — CroissantGames');
    document.getElementById('og-description').setAttribute('content', description);
    document.getElementById('og-url').setAttribute('content', pageUrl);
    document.getElementById('twitter-title').setAttribute('content', gameName + ' — CroissantGames');
    document.getElementById('twitter-description').setAttribute('content', description);

    const jsonLd = {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": gameName,
      "url": pageUrl,
      "applicationCategory": "Game",
      "operatingSystem": "Any browser"
    };
    document.getElementById('json-ld').textContent = JSON.stringify(jsonLd);

    // =========================================
    // Récemment joués (localStorage, max 6, sans doublon)
    // =========================================
    function addToRecents(id) {
      if (!id) return;
      let recents = JSON.parse(localStorage.getItem('recents') || '[]');
      recents = recents.filter(r => r !== id); // retire le doublon s'il existe
      recents.unshift(id); // ajoute en premier
      recents = recents.slice(0, 6); // garde max 6
      localStorage.setItem('recents', JSON.stringify(recents));
    }
    addToRecents(gameId);

    // =========================================
    // Compteur de clics global — partagé entre TOUS les visiteurs via Supabase
    // =========================================
    if (gameId) {
      incrementGlobalPlayCount(gameId);
    }
    // Affiche le total de clics une fois récupéré (légèrement différé pour ne pas
    // bloquer le chargement du jeu)
    fetchAllGameStats().then(allStats => {
      const stats = allStats[gameId];
      const total = stats ? stats.total_plays : 1;
      document.getElementById('play-counter').textContent = `${total} clic${total > 1 ? 's' : ''} au total sur ce jeu`;
    });

    // =========================================
    // Notation par étoiles — partagée globalement via Supabase.
    // localStorage retient juste si CE visiteur a déjà noté, pour afficher
    // son propre choix visuellement (pas pour calculer la moyenne affichée).
    // =========================================
    function getMaNoteLocale() {
      return parseInt(localStorage.getItem(`note_${gameId}`) || '0', 10);
    }
    function afficherEtoiles() {
      const maNote = getMaNoteLocale();
      const starsEl = document.getElementById('rating-stars');
      starsEl.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('span');
        star.textContent = i <= maNote ? '★' : '☆';
        star.className = 'star-pick';
        star.setAttribute('role', 'button');
        star.setAttribute('aria-label', `Donner ${i} étoile${i > 1 ? 's' : ''}`);
        star.addEventListener('click', () => {
          // Si déjà noté avant, on ne renvoie pas une 2e fois (évite de fausser la moyenne)
          if (getMaNoteLocale() > 0) return;
          localStorage.setItem(`note_${gameId}`, i);
          submitGlobalRating(gameId, i);
          afficherEtoiles();
          afficherMoyenne();
        });
        starsEl.appendChild(star);
      }
    }
    function afficherMoyenne() {
      fetchAllGameStats().then(allStats => {
        const stats = allStats[gameId];
        const moyenne = getAverageRating(stats);
        const moyenneEl = document.getElementById('rating-average');
        if (moyenneEl) {
          moyenneEl.textContent = stats && stats.rating_count > 0
            ? `Note moyenne : ${moyenne.toFixed(1)}/5 (${stats.rating_count} vote${stats.rating_count > 1 ? 's' : ''})`
            : 'Aucune note pour l\'instant';
        }
      });
    }
    if (gameId) {
      afficherEtoiles();
      afficherMoyenne();
    }

    // =========================================
    // Boutons de partage social — ouvrent la fenêtre de partage classique de chaque réseau
    // =========================================
    const partageTexte = encodeURIComponent(`Viens jouer à ${gameName} sur CroissantGames !`);
    const partageUrl = encodeURIComponent(pageUrl);

    const twitterBtn = document.getElementById('share-twitter');
    if (twitterBtn) {
      twitterBtn.addEventListener('click', () => {
        window.open(`https://twitter.com/intent/tweet?text=${partageTexte}&url=${partageUrl}`, '_blank', 'width=550,height=420');
      });
    }

    const facebookBtn = document.getElementById('share-facebook');
    if (facebookBtn) {
      facebookBtn.addEventListener('click', () => {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${partageUrl}`, '_blank', 'width=550,height=420');
      });
    }

    const whatsappBtn = document.getElementById('share-whatsapp');
    if (whatsappBtn) {
      whatsappBtn.addEventListener('click', () => {
        window.open(`https://wa.me/?text=${partageTexte}%20${partageUrl}`, '_blank');
      });
    }

    // =========================================
    // Bouton de partage — copie le lien de la page dans le presse-papier
    // =========================================
    const shareBtn = document.getElementById('share-btn');
    if (shareBtn) {
      shareBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(pageUrl).then(() => {
          const original = shareBtn.textContent;
          shareBtn.textContent = '✓ Lien copié !';
          setTimeout(() => { shareBtn.textContent = original; }, 1800);
        });
      });
    }

    // =========================================
    // Chargement de l'iframe GameDistribution
    // =========================================
    const iframe = document.getElementById('game-frame');
    const statusMsg = document.getElementById('status-msg');
    const pauseOverlay = document.getElementById('pause-overlay');
    const errorBox = document.getElementById('error-box');

    if (gameId) {
      // Taille "idéale" du jeu telle que fournie par GameDistribution (capée à 800px de large
      // pour ne pas être démesurée sur grand écran), mais le ratio est conservé via aspect-ratio
      // CSS : ainsi l'iframe se redimensionne automatiquement à la largeur de l'écran sur mobile.
      const maxDisplayWidth = 800;
      const idealWidth = Math.min(gameWidth, maxDisplayWidth);

      iframe.style.width = idealWidth + 'px';
      iframe.style.maxWidth = '100%';
      iframe.style.aspectRatio = `${gameWidth} / ${gameHeight}`;
      iframe.style.height = 'auto';
      iframe.parentElement.style.width = idealWidth + 'px';
      iframe.parentElement.style.maxWidth = '100%';

      const gdUrl = `https://html5.gamedistribution.com/${gameId}/?gd_sdk_referrer_url=${encodeURIComponent(pageUrl)}`;
      iframe.src = gdUrl;

      // Track le lancement du jeu (analytics.js chargé plus bas dans la page)
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof trackEvent === 'function') {
          trackEvent('game_start', { game_id: gameId, game_name: gameName });
        }
      });
    } else {
      statusMsg.textContent = '❌ Aucun jeu spécifié.';
    }

    // =========================================
    // Configuration SDK GameDistribution
    // =========================================
    window["GD_OPTIONS"] = {
      "gameId": gameId,
      "onEvent": function (event) {
        switch (event.name) {
          case "SDK_READY":
            statusMsg.textContent = '';
            break;
          case "SDK_GAME_START":
            pauseOverlay.classList.remove('visible');
            break;
          case "SDK_GAME_PAUSE":
            pauseOverlay.classList.add('visible');
            break;
          case "SDK_ERROR":
            iframe.style.display = 'none';
            errorBox.classList.add('visible');
            break;
        }
      }
    };

    // =========================================
    // Bouton Réessayer
    // =========================================
    document.getElementById('retry-btn').addEventListener('click', () => {
      window.location.reload();
    });

    // =========================================
    // Bouton plein écran — tente l'API native du navigateur, et si elle échoue
    // ou n'est pas disponible (cas fréquent sur mobile, notamment iOS), bascule
    // automatiquement sur un mode plein écran simulé en CSS.
    // =========================================
    const iframeWrap = document.getElementById('iframe-wrap');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    function supporteFullscreenNatif() {
      return !!(
        document.fullscreenEnabled ||
        document.webkitFullscreenEnabled ||
        document.mozFullScreenEnabled ||
        document.msFullscreenEnabled
      );
    }

    function activerFullscreenCSS() {
      iframeWrap.classList.add('fake-fullscreen');
      document.body.classList.add('fake-fullscreen-active');
    }

    function quitterFullscreenCSS() {
      iframeWrap.classList.remove('fake-fullscreen');
      document.body.classList.remove('fake-fullscreen-active');
    }

    fullscreenBtn.addEventListener('click', () => {
      // Si déjà en mode CSS simulé, on en sort en recliquant le bouton
      if (iframeWrap.classList.contains('fake-fullscreen')) {
        quitterFullscreenCSS();
        return;
      }

      if (supporteFullscreenNatif()) {
        const request = iframe.requestFullscreen || iframe.webkitRequestFullscreen ||
          iframe.mozRequestFullScreen || iframe.msRequestFullscreen;
        if (request) {
          const result = request.call(iframe);
          // requestFullscreen() peut être rejetée (Promise) sur certains mobiles
          // même quand l'API existe — dans ce cas on bascule sur le fallback CSS.
          if (result && typeof result.catch === 'function') {
            result.catch(() => activerFullscreenCSS());
          }
          return;
        }
      }
      // API non disponible du tout (cas iOS Safari) → fallback CSS direct
      activerFullscreenCSS();
    });

    // Permet aussi de quitter le mode CSS simulé avec la touche Échap
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && iframeWrap.classList.contains('fake-fullscreen')) {
        quitterFullscreenCSS();
      }
    });

    // Bouton flottant "✕" visible uniquement en mode plein écran simulé
    const exitFakeBtn = document.getElementById('exit-fake-fullscreen');
    if (exitFakeBtn) {
      exitFakeBtn.addEventListener('click', quitterFullscreenCSS);
    }

    // =========================================
    // Bouton retour en haut
    // =========================================
    const backToTopBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      backToTopBtn.classList.toggle('visible', window.scrollY > 300);
    });
    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    } // fin de lancerJeu()

    // Démarre le chargement du jeu (via slug ou params classiques)
    initJeu();
  </script>
