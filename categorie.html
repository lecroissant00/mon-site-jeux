<!DOCTYPE html>
<html lang="fr">
<head>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="page-title">Catégorie — CroissantGames</title>
  <meta id="meta-description" name="description" content="Découvre les jeux par catégorie sur CroissantGames.">
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5808527177460754" crossorigin="anonymous"></script>
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="logo"><a href="index.html">Croissant<span>Games</span></a></div>
    <nav class="main-nav">
      <div class="genre-dropdown" id="genre-dropdown">
        <button class="genre-toggle" id="genre-toggle" aria-haspopup="true" aria-expanded="false">
          Genres ▾
        </button>
        <div class="genre-menu" id="genre-menu"></div>
      </div>
    </nav>
    <button id="random-game-btn" class="random-btn" type="button">🎲 Jeu au hasard</button>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Changer de thème">🌙</button>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Chercher un jeu..." autocomplete="off">
      <div class="search-suggestions" id="search-suggestions"></div>
    </div>
  </header>

  <main class="games-section" style="max-width:1200px; margin:0 auto; padding:1.5rem;">
    <h1 id="cat-title">Jeux</h1>
    <p id="cat-count" style="color:#888; font-size:0.9rem; margin-bottom:1rem;"></p>

    <div class="games-grid" id="games-grid"></div>

    <p id="no-results" style="color:#888; display:none;">
      Aucun jeu trouvé dans cette catégorie. <a href="index.html" style="color:#a78bfa;">Retour à l'accueil</a>
    </p>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 CroissantGames — Tous droits réservés</p>
    <a href="mentions-legales.html">Mentions légales</a>
  </footer>

  <button id="back-to-top" aria-label="Retour en haut">↑</button>

  <!-- On réutilise le tableau de jeux et les fonctions de main.js -->
  <script src="js/supabase-stats.js"></script>
  <script src="js/main.js"></script>

  <script>
    // =========================================
    // Lecture de la catégorie depuis l'URL
    // =========================================
    const catParams = new URLSearchParams(window.location.search);
    const categorie = catParams.get('cat') || '';

    document.getElementById('cat-title').textContent = categorie ? `Jeux ${categorie}` : 'Tous les jeux';
    document.getElementById('page-title').textContent = (categorie ? `Jeux ${categorie}` : 'Catégorie') + ' — CroissantGames';
    document.getElementById('meta-description').setAttribute(
      'content',
      `Découvre tous les jeux ${categorie} gratuits en ligne sur CroissantGames.`
    );

    // Track le filtre catégorie (script analytics.js chargé plus bas dans la page)
    if (categorie) {
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof trackEvent === 'function') {
          trackEvent('category_filter', { category_name: categorie });
        }
      });
    }

    // =========================================
    // Filtrage et affichage
    // On attend que main.js ait fini de charger games.json (événement jeuxPrets)
    // =========================================
    document.addEventListener('jeuxPrets', () => {
      const catGrid = document.getElementById('games-grid');
      const noResults = document.getElementById('no-results');
      const countEl = document.getElementById('cat-count');

      const resultats = categorie
        ? jeux.filter(j => j.categorie.toLowerCase() === categorie.toLowerCase())
        : jeux;

      countEl.textContent = `${resultats.length} jeu${resultats.length > 1 ? 'x' : ''} trouvé${resultats.length > 1 ? 's' : ''}`;

      if (resultats.length === 0) {
        catGrid.style.display = 'none';
        noResults.style.display = 'block';
      } else {
        resultats.forEach(jeu => catGrid.appendChild(createCard(jeu)));
      }
    });
  </script>

  <script src="js/cookie-banner.js"></script>
  <script src="js/analytics.js"></script>

</body>
</html>
